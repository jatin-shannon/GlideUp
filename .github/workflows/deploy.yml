name: Deploy to Cloudflare Pages

# Ships the production build to Cloudflare Pages on every push to main.
#
# Requires these to be set in the repo (Settings → Secrets and variables →
# Actions):
#   Secrets:
#     CLOUDFLARE_API_TOKEN   – token with "Cloudflare Pages: Edit" permission
#     CLOUDFLARE_ACCOUNT_ID  – your Cloudflare account id
#   Variables (public, safe to expose — enable cloud sync at build time):
#     VITE_SUPABASE_URL
#     VITE_SUPABASE_ANON_KEY
#
# The Supabase vars are optional: without them the app still deploys and runs
# as the fully offline, local-only MVP.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=glideup
